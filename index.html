<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Bel Otomatis | SMK KBM 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
        }

        .digital-clock {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }

        .status-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .active-glow {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="max-w-2xl w-full">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-sky-400">SMK KARYA BAHANA MANDIRI 1</h1>
            <p class="text-slate-400 uppercase tracking-widest text-sm mt-1">Sistem Otomasi Bel Sekolah Terpadu</p>
        </div>

        <!-- Main Dashboard -->
        <div class="glass-panel rounded-3xl p-8 shadow-2xl overflow-hidden relative">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-sky-500/10 rounded-full blur-3xl"></div>
            
            <div class="relative z-10">
                <!-- Clock Section -->
                <div class="text-center mb-8">
                    <div id="clock" class="digital-clock text-6xl md:text-8xl font-bold text-white mb-2">00:00:00</div>
                    <div id="date" class="text-slate-400 font-medium">Memuat tanggal...</div>
                </div>

                <!-- Action Button / Status -->
                <div id="initSection" class="flex justify-center mb-8">
                    <button onclick="startSystem()" class="bg-sky-500 hover:bg-sky-400 text-white font-bold py-4 px-8 rounded-full shadow-lg transition-all transform hover:scale-105 active:scale-95 flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        AKTIFKAN SISTEM BEL
                    </button>
                </div>

                <div id="statusSection" class="hidden flex flex-col items-center mb-8">
                    <div class="flex items-center gap-2 px-4 py-2 bg-emerald-500/10 text-emerald-400 rounded-full border border-emerald-500/20 mb-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full status-pulse"></span>
                        <span class="text-sm font-semibold tracking-wide uppercase">Sistem Aktif & Terpantau</span>
                    </div>
                    <div id="nextEvent" class="text-slate-400 text-sm">Menghitung jadwal berikutnya...</div>
                    <div class="flex gap-2 mt-4 flex-wrap justify-center">
                        <button onclick="testBell('masuk')" class="text-[10px] bg-white/5 border border-white/10 px-3 py-1 rounded hover:bg-white/10 transition">Uji Bel Masuk</button>
                        <button onclick="testBell('piket')" class="text-[10px] bg-white/5 border border-white/10 px-3 py-1 rounded hover:bg-white/10 transition">Uji Bel Piket</button>
                        <button onclick="testBell('pulang')" class="text-[10px] bg-white/5 border border-white/10 px-3 py-1 rounded hover:bg-white/10 transition">Uji Bel Pulang</button>
                    </div>
                </div>

                <!-- Schedule Grid -->
                <div class="grid grid-cols-1 gap-3 max-h-[400px] overflow-y-auto pr-2" id="scheduleList"></div>
            </div>
        </div>

        <div class="mt-6 text-center text-slate-500 text-xs italic">
            <p>&copy; 2026 SMK KBM 1 Bekasi. Gunakan Google Chrome untuk performa audio terbaik.</p>
        </div>
    </div>

    <!-- Feedback Message Box -->
    <div id="messageBox" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 glass-panel px-8 py-4 rounded-2xl shadow-xl border-sky-500/50 text-sky-400 font-bold hidden z-50 text-center min-w-[320px]">
        <div id="messageText">🔊 Sedang Mengumumkan...</div>
        <div id="repeatIndicator" class="text-xs text-slate-400 mt-1 uppercase tracking-tighter">Pengulangan 1/3</div>
    </div>

<script>
    const jadwal = [
        { jam: "07:00", ket: "Masuk Sekolah", tipe: "wajib", info: "Perhatian, saatnya Bel Masuk Sekolah. Selamat pagi kepada seluruh siswa dan guru SMK Karya Bahana Mandiri 1. Mari kita awali hari ini dengan semangat belajar yang tinggi dan penuh disiplin." },
        { jam: "09:35", ket: "Istirahat Pertama", tipe: "istirahat", info: "Perhatian, saatnya waktu istirahat pertama telah tiba." },
        { jam: "10:05", ket: "Masuk Setelah Istirahat", tipe: "wajib", info: "Perhatian, waktu istirahat telah berakhir. Silakan kembali ke kelas masing-masing untuk melanjutkan pelajaran." },
        { jam: "11:40", ket: "Persiapan Sholat Zhuhur", tipe: "sholat", info: "Perhatian, saatnya persiapan sholat zhuhur berjamaah." },
        { jam: "13:00", ket: "Jam Pelajaran Siang", tipe: "wajib", info: "Perhatian, saatnya jam pelajaran siang dimulai." },
        { jam: "15:15", ket: "Istirahat & Persiapan Sholat Ashar", tipe: "sholat", info: "Perhatian, saatnya persiapan sholat ashar berjamaah." },
        { jam: "15:45", ket: "Masuk Setelah Sholat Ashar", tipe: "wajib", info: "Perhatian, saatnya kembali ke kelas untuk pelajaran terakhir." },
        { jam: "16:30", ket: "Piket Siswa & Kebersihan", tipe: "piket", info: "Perhatian kepada seluruh siswa SMK Karya Bahana Mandiri 1, khususnya petugas piket. Saatnya melaksanakan tugas kebersihan. Ditekankan untuk membersihkan area bengkel, baik di dalam area bengkel TKR maupun di luar area bengkel TKR dengan sangat bersih dan bebas dari segala jenis sampah." },
        { jam: "16:45", ket: "Pulang Sekolah", tipe: "pulang", info: "Perhatian, saatnya Bel Pulang Sekolah. Seluruh kegiatan belajar mengajar hari ini telah selesai. Terima kasih atas partisipasinya, silakan merapikan barang-barang, dan tetap berhati-hati saat perjalanan pulang ke rumah." }
    ];

    let isStarted = false;
    let audioCtx = null;
    let isSpeaking = false;

    function startSystem() {
        isStarted = true;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('initSection').classList.add('hidden');
        document.getElementById('statusSection').classList.remove('hidden');
        announce("Sistem bel otomatis SMK Karya Bahana Mandiri satu telah diaktifkan.", false);
    }

    function playChime(isLong = false) {
        if (!audioCtx) return;
        const masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.4;
        masterGain.connect(audioCtx.destination);

        const playTone = (freq, start, duration) => {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, start);
            g.gain.setValueAtTime(0, start);
            g.gain.linearRampToValueAtTime(0.6, start + 0.1);
            g.gain.exponentialRampToValueAtTime(0.01, start + duration);
            osc.connect(g);
            g.connect(masterGain);
            osc.start(start);
            osc.stop(start + duration);
        };

        const now = audioCtx.currentTime;
        if (isLong) {
            // Nada panjang (melodi megah)
            playTone(329.63, now, 1.2);       // E4
            playTone(392.00, now + 0.6, 1.2); // G4
            playTone(440.00, now + 1.2, 1.2); // A4
            playTone(523.25, now + 1.8, 2.0); // C5
        } else {
            // Nada pendek (standar)
            playTone(392.00, now, 1.5);       // G4
            playTone(329.63, now + 0.8, 1.8); // E4
        }
    }

    function announce(text, isLong = false) {
        if (!isStarted || isSpeaking) return;
        isSpeaking = true;

        const box = document.getElementById('messageBox');
        const indicator = document.getElementById('repeatIndicator');
        const messageText = document.getElementById('messageText');
        
        box.classList.remove('hidden');
        let currentRepeat = 0;

        function speakCycle() {
            currentRepeat++;
            indicator.innerText = `Pengulangan ${currentRepeat}/3`;
            messageText.innerText = `🔊 Mengumumkan: ${text.substring(0, 30)}...`;
            
            playChime(isLong);

            const delay = isLong ? 4200 : 2200;

            setTimeout(() => {
                const msg = new SpeechSynthesisUtterance();
                msg.text = text;
                msg.lang = 'id-ID';
                msg.rate = 0.82; // Sedikit lebih lambat agar sangat jelas
                
                msg.onend = () => {
                    if (currentRepeat < 3) {
                        setTimeout(speakCycle, 2000);
                    } else {
                        isSpeaking = false;
                        setTimeout(() => box.classList.add('hidden'), 3000);
                    }
                };

                window.speechSynthesis.speak(msg);
            }, delay);
        }

        speakCycle();
    }

    function testBell(type) {
        if (type === 'masuk') announce(jadwal[0].info, true);
        else if (type === 'piket') announce(jadwal.find(j => j.jam === "16:30").info, true);
        else announce(jadwal[jadwal.length - 1].info, true);
    }

    function update() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        
        const timeStr = `${h}:${m}:${s}`;
        const timeShort = `${h}:${m}`;

        document.getElementById('clock').innerText = timeStr;
        document.getElementById('date').innerText = now.toLocaleDateString('id-ID', { 
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
        });

        if (isStarted && s === "00") {
            const ev = jadwal.find(j => j.jam === timeShort);
            if (ev) {
                // Gunakan nada panjang untuk Masuk, Piket, dan Pulang
                const isSpecial = (ev.jam === "07:00" || ev.jam === "16:30" || ev.jam === "16:45");
                announce(ev.info, isSpecial);
            }
        }
        renderSchedule(timeShort);
    }

    function renderSchedule(current) {
        const list = document.getElementById('scheduleList');
        let nextFound = false;

        list.innerHTML = jadwal.map(item => {
            const isActive = item.jam === current;
            const isPassed = item.jam < current;
            
            if (!nextFound && item.jam > current) {
                document.getElementById('nextEvent').innerText = `BERIKUTNYA: ${item.jam} - ${item.ket}`;
                nextFound = true;
            }

            let colorClass = "text-slate-300";
            let bgClass = "bg-white/5";
            let borderClass = "border-white/5";

            if (isActive) {
                colorClass = "text-sky-400";
                bgClass = "bg-sky-500/10";
                borderClass = "border-sky-500/40 active-glow";
            } else if (isPassed) {
                colorClass = "text-slate-600";
                bgClass = "bg-black/20 text-opacity-50";
            }

            return `
                <div class="flex items-center justify-between p-4 rounded-2xl border ${borderClass} ${bgClass} transition-all duration-500">
                    <div class="flex flex-col">
                        <span class="text-[10px] uppercase tracking-widest font-bold opacity-40 mb-1 ${isActive ? 'text-sky-400 opacity-100' : ''}">${item.tipe}</span>
                        <span class="font-semibold ${colorClass}">${item.ket}</span>
                    </div>
                    <div class="text-xl font-bold ${colorClass}">${item.jam}</div>
                </div>
            `;
        }).join('');

        if (!nextFound) document.getElementById('nextEvent').innerText = "SEMUA JADWAL HARI INI SELESAI";
    }

    setInterval(update, 1000);
    update();
</script>
</body>
</html>
